{% extends "base.html" %}

{% block title %}My Profile — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Welcome, {{ username }}</h1>
            <p class="auth-subtitle">Manage your account and view your balance</p>
        </div>

        <div class="auth-card">
            <div class="profile-balance-container" style="text-align: center; padding: 20px 0;">
                <p style="color: #666; margin-bottom: 10px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Current Balance</p>
                <h2 style="font-size: 2.5rem; color: #1a1a1a; margin: 0;">₹{{ "%.2f"|format(balance) }}</h2>
            </div>

            <div style="border-top: 1px solid #eee; margin-top: 20px; padding-top: 20px;">
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: #666;">User Email</span>
                    <span style="font-weight: 500;">{{ username }}</span>
                </div>
            </div>
        </div>

    </div>
</section>

{% endblock %}
